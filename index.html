<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>yisabeila</title>
  <link rel="icon" type="image/png" href="favicon.png" />
  <link rel="stylesheet" href="https://use.typekit.net/esn7usg.css" />
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --red: #bf5e5a;
      --teal: #97b2b3;
      --dark: #383838;
      --cream: #e9e8e7;
    }

    html, body {
      width: 100%;
      min-height: 100%;
    }

    body {
      background-color: var(--teal);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100dvh;
      padding: 40px 20px;
      gap: 24px;
      font-family: "handsome-pro", sans-serif;
    }

    /* ── stamp ── */
    .stamp-wrapper {
      position: relative;
      width: min(260px, 74vw);
      opacity: 0;
      animation: fadeUp 0.9s cubic-bezier(0.22, 1, 0.36, 1) 0.1s forwards;
    }

    .stamp-wrapper img.stamp-img {
      width: 100%;
      height: auto;
      display: block;
    }

    /* text floated inside stamp perforated area */
    .stamp-content {
      position: absolute;
      top: 8%;
      left: 11%;
      right: 11%;
      bottom: 8%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-end;
      padding-bottom: 13%;
      text-align: center;
      overflow: visible;
    }

    .days-label {
      font-family: "handsome-pro", sans-serif;
      font-weight: 700;
      color: var(--red);
      font-size: clamp(34px, 13vw, 80px);
      line-height: 1;
      letter-spacing: -3px;
      /* pull it upward so it overlaps the botanical illustration */
      margin-bottom: 0.8em;
      margin-top: -1.8em;
      transform: rotate(-6deg);
      transform-origin: center center;
      position: relative;
      z-index: 2;
      opacity: 0;
      animation: fadeUpTilt 0.7s cubic-bezier(0.22, 1, 0.36, 1) 0.5s forwards;
    }

    .stamp-body {
      font-family: "handsome-pro", sans-serif;
      font-weight: 500;
      color: var(--dark);
      font-size: clamp(9.5px, 3.5vw, 20px);
      line-height: 1.1;
      max-width: 80%;
      margin-bottom: 1.1em;
      opacity: 0;
      animation: fadeUp 0.7s cubic-bezier(0.22, 1, 0.36, 1) 0.7s forwards;
    }

    .stamp-date {
      font-family: "handsome-pro", sans-serif;
      font-weight: 900;
      color: var(--dark);
      font-size: clamp(8.5px, 3vw, 20px);
      letter-spacing: 0.04em;
      opacity: 0;
      animation: fadeUp 0.7s cubic-bezier(0.22, 1, 0.36, 1) 0.85s forwards;
    }

    /* ── logo ── */
    .logo-wrap {
      opacity: 0;
      animation: fadeUp 0.7s cubic-bezier(0.22, 1, 0.36, 1) 1s forwards;
    }

    .logo-wrap img {
      width: min(120px, 34vw);
      height: auto;
      display: block;
    }

    /* ── keyframes ── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeUpTilt {
      from { opacity: 0; transform: rotate(-6deg) translateY(14px); }
      to   { opacity: 1; transform: rotate(-6deg) translateY(0); }
    }

    /* desktop */
    @media (min-width: 600px) {
      .stamp-wrapper { width: 300px; }
    }
    @media (min-width: 900px) {
      .stamp-wrapper { width: 340px; }
    }
  </style>
</head>
<body>

  <div class="stamp-wrapper">
    <img class="stamp-img" src="stamp.svg" alt="stamp" />

    <div class="stamp-content">
      <p class="days-label"><span id="dayCount">—</span> days</p>
      <p class="stamp-body">
        We are weaving together the final threads of a story years in the making. A sanctuary for the skin, and a soul for the heart.
      </p>
      <p class="stamp-date">13.10.2026</p>
    </div>
  </div>

  <div class="logo-wrap">
    <img src="yisabeila-logo.svg" alt="yisabeila" />
  </div>

  <script>
    function getDaysUntil(targetDateStr) {
      const now = new Date();
      const target = new Date(targetDateStr);
      const nowDay  = new Date(now.getFullYear(),    now.getMonth(),    now.getDate());
      const tgtDay  = new Date(target.getFullYear(), target.getMonth(), target.getDate());
      return Math.max(0, Math.ceil((tgtDay - nowDay) / 86400000));
    }

    document.getElementById('dayCount').textContent = getDaysUntil('2026-10-13');
  </script>
</body>
</html>
